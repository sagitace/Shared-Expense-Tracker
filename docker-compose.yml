services:
  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mysql

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: shared_expense_tracker
      MYSQL_USER: tracker
      MYSQL_PASSWORD: tracker
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./backend
    command: celery -A shared_expense_tracker worker -l info
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
      - mysql

volumes:
  mysql_data:
